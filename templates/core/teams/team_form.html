{% extends 'layout/layout_vertical.html' %}
{% load i18n %}

{% block title %}{{ title }} - {% trans "Teams" %}{% endblock %}

{% block content %}
<div class="row">
  <div class="col-xxl">
    <div class="card mb-6">
      <div class="card-header d-flex align-items-center justify-content-between">
        <h5 class="mb-0">{{ title }}</h5>
        <small class="text-muted float-end">{% trans "Deployment Team Configuration" %}</small>
      </div>
      <div class="card-body">
        <form method="post" class="confirm-save" novalidate>
          {% csrf_token %}
          {% load crispy_forms_tags %}
          {{ form|crispy }}
          
          <div class="row justify-content-end mt-6">
            <div class="col-sm-12 text-end">
              <button type="submit" class="btn btn-primary">
                <i class="bx bx-save me-1"></i>{% trans "Save Team" %}
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
