<!--Fonts (Local)-->
<link rel="stylesheet" href="{% static 'vendor/fonts/fonts.css' %}" />

<!-- Icons -->
<link rel="stylesheet" href="{% static 'vendor/fonts/iconify-icons.css' %}" />

<!--Vendor CSS-->
<link rel="stylesheet" href="{% static 'vendor/libs/perfect-scrollbar/perfect-scrollbar.css' %}" />
<!-- Select2 CSS (Local) -->
<link rel="stylesheet" href="{% static 'vendor/libs/select2/select2.min.css' %}" />
<link rel="stylesheet" href="{% static 'vendor/libs/select2/select2-bootstrap-5-theme.min.css' %}" />

<!--Core CSS -->
<link rel="stylesheet" href="{% static 'vendor/css/core.css' %}" />
<link rel="stylesheet" href="{% static 'css/demo.css' %}" />
<link rel="stylesheet" href="{% static 'css/dark-mode-polyfill.css' %}" />

<!-- Custom Select2 Overrides for Sneat -->
<style>
  /* Custom Select2 Overrides for Sneat (Theme Support) */
  .select2-container--bootstrap-5 .select2-selection {
    border: 1px solid var(--bs-border-color);
    border-radius: 0.375rem;
    min-height: calc(1.53em + 0.844rem + 2px);
    background-color: var(--bs-body-bg);
    color: var(--bs-body-color);
  }
  .select2-container--bootstrap-5.select2-container--focus .select2-selection {
    border-color: var(--bs-primary);
    box-shadow: 0 0 0.25rem 0.05rem rgba(var(--bs-primary-rgb), 0.1);
  }
  .select2-container--bootstrap-5 .select2-selection--multiple .select2-selection__choice {
    background-color: var(--bs-primary);
    color: var(--bs-primary-contrast, #fff);
    border: none;
    border-radius: 0.25rem;
    padding: 2px 8px;
  }
  .select2-container--bootstrap-5 .select2-selection--multiple .select2-selection__choice__remove {
    color: rgba(255, 255, 255, 0.8);
    border: none;
  }
  .select2-container--bootstrap-5 .select2-selection--multiple .select2-selection__choice__remove:hover {
    color: #fff;
    background: transparent;
  }
  /* Fix text color inside selection */
  .select2-container--bootstrap-5 .select2-selection__rendered {
    color: var(--bs-body-color) !important;
  }
  /* Dropdown theme fix */
  .select2-dropdown {
    background-color: var(--bs-paper-bg, var(--bs-body-bg));
    border-color: var(--bs-border-color);
  }
  .select2-container--bootstrap-5 .select2-results__option {
    color: var(--bs-body-color);
  }
  .select2-container--bootstrap-5 .select2-results__option--highlighted[aria-selected] {
    background-color: var(--bs-primary);
    color: #fff;
  }
  
  [dir="rtl"] .select2-container {
    direction: rtl;
    text-align: right;
  }

  /* Validation Styles */
  .is-invalid + .select2-container--bootstrap-5 .select2-selection,
  .is-invalid.select2-hidden-accessible + .select2-container--bootstrap-5 .select2-selection {
    border-color: #ff3e1d !important;
  }
  
  /* Prominent Red Border for fields with actual errors */
  .form-control.is-invalid, 
  .form-select.is-invalid,
  .was-validated .form-control:invalid,
  .was-validated .form-select:invalid {
    border-color: #ff3e1d !important;
    border-width: 1px !important;
  }
  
  .form-control.is-invalid:focus, 
  .form-select.is-invalid:focus,
  .was-validated .form-control:invalid:focus,
  .was-validated .form-select:invalid:focus {
    box-shadow: 0 0 0.25rem 0.05rem rgba(255, 62, 29, 0.1) !important;
  }

  /* Disable Green Borders (Success state) completely */
  .was-validated .form-control:valid,
  .was-validated .form-select:valid,
  .form-control.is-valid,
  .form-select.is-valid,
  .is-valid + .select2-container--bootstrap-5 .select2-selection,
  .is-valid.select2-hidden-accessible + .select2-container--bootstrap-5 .select2-selection,
  .was-validated select:valid + .select2-container--bootstrap-5 .select2-selection {
    border-color: #d9dee3 !important; /* Force default border color */
    background-image: none !important;
    box-shadow: none !important;
  }
  
  [data-bs-theme="dark"] .was-validated .form-control:valid,
  [data-bs-theme="dark"] .was-validated .form-select:valid,
  [data-bs-theme="dark"] .form-control.is-valid,
  [data-bs-theme="dark"] .form-select.is-valid,
  [data-bs-theme="dark"] .is-valid + .select2-container--bootstrap-5 .select2-selection,
  [data-bs-theme="dark"] .is-valid.select2-hidden-accessible + .select2-container--bootstrap-5 .select2-selection,
  [data-bs-theme="dark"] .was-validated select:valid + .select2-container--bootstrap-5 .select2-selection {
      border-color: #444b54 !important; /* Force default dark border */
  }

  /* Reset focus state for valid fields */
  .was-validated .form-control:valid:focus,
  .was-validated .form-select:valid:focus,
  .form-control.is-valid:focus,
  .form-select.is-valid:focus,
  .is-valid + .select2-container--bootstrap-5.select2-container--focus .select2-selection,
  .was-validated select:valid + .select2-container--bootstrap-5.select2-container--focus .select2-selection {
    border-color: var(--bs-primary) !important;
    box-shadow: none !important;
  }

  .invalid-feedback, .text-danger.small {
    color: #ff3e1d;
    font-size: 0.8125rem;
    margin-top: 0.25rem;
    display: block;
  }
  
  /* Professional Global Error Styles (Matching Login Screen) */
  .alert-danger {
    font-size: 0.85rem;
    background: rgba(255, 62, 29, 0.05) !important;
    color: #ff3e1d !important;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 25px;
    border: 1px solid rgba(255, 62, 29, 0.1) !important;
    border-left: 4px solid #ff3e1d !important;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideInShake 0.5s ease-out;
  }

  [dir="rtl"] .alert-danger {
    border-left: 1px solid rgba(255, 62, 29, 0.1) !important;
    border-right: 4px solid #ff3e1d !important;
  }

  .error-icon {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
  }

  @keyframes slideInShake {
    0% { transform: translateX(20px); opacity: 0; }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(2px); }
    100% { transform: translateX(0); opacity: 1; }
  }
  
  /* Crispy field error text refinement */
  .invalid-feedback strong {
    font-weight: 500;
  }

  /* Desktop Pro Sidebar Collapse Emulation */
  @media (min-width: 1200px) {
    .layout-menu-collapsed:not(.layout-transitioning):not(.layout-menu-offcanvas):not(.layout-menu-fixed-offcanvas) .layout-page {
      padding-left: 5rem !important;
      transition: padding 0.15s ease-in-out;
    }
    [dir="rtl"].layout-menu-collapsed:not(.layout-transitioning):not(.layout-menu-offcanvas):not(.layout-menu-fixed-offcanvas) .layout-page {
      padding-right: 5rem !important;
      padding-left: 0 !important;
      transition: padding 0.15s ease-in-out;
    }
    
    .layout-menu-hover:not(.layout-transitioning):not(.layout-menu-offcanvas):not(.layout-menu-fixed-offcanvas) .layout-page {
      padding-left: 5rem !important;
    }
    [dir="rtl"].layout-menu-hover:not(.layout-transitioning):not(.layout-menu-offcanvas):not(.layout-menu-fixed-offcanvas) .layout-page {
      padding-right: 5rem !important;
      padding-left: 0 !important;
    }
    
    /* Keep toggle button always visible when collapsed maintaining native design */
    .layout-menu-collapsed:not(.layout-menu-hover) .app-brand {
      overflow: visible !important;
    }
    .layout-menu-collapsed:not(.layout-menu-hover) .app-brand .layout-menu-toggle {
      display: block !important;
      opacity: 1 !important;
      visibility: visible !important;
    }
  }

  /* Mobile RTL Offcanvas Fix */
  @media (max-width: 1199.98px) {
    [dir="rtl"] .layout-menu {
      transform: translate3d(100%, 0, 0) !important;
      transition: transform 0.25s ease-in-out !important;
    }
    [dir="rtl"].layout-menu-expanded .layout-menu {
      transform: translate3d(0, 0, 0) !important;
    }
  }
  /* Navbar Glassmorphism & Premium UI */
  .navbar-detached {
    backdrop-filter: blur(8px);
    background-color: rgba(var(--bs-body-bg-rgb), 0.85) !important;
    border: 1px solid rgba(var(--bs-border-color-rgb), 0.5);
    transition: all 0.3s ease;
  }
  
  .navbar-detached:hover {
    box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.08) !important;
  }

  /* Quick Report Button Enhancement */
  .btn-primary.shadow-sm:hover {
    transform: translateY(-1px);
    box-shadow: 0 0.5rem 1.125rem -0.5rem rgba(var(--bs-primary-rgb), 0.5) !important;
  }

  /* Search Input Visual Refinement */
  .navbar-nav .input-group-text i {
    transition: color 0.2s;
  }
  .navbar-nav .form-control:focus + .input-group-text i {
    color: var(--bs-primary) !important;
  }

  /* Animation: Ringing Bell for Notifications */
  .animate-bell {
    display: inline-block;
    animation: bell-ring 2.5s infinite;
    transform-origin: top center;
  }
  @keyframes bell-ring {
    0%, 100% { transform: rotate(0); }
    10%, 30%, 50%, 70%, 90% { transform: rotate(10deg); }
    20%, 40%, 60%, 80% { transform: rotate(-10deg); }
  }

  /* Shortcuts Grid Polish */
  .dropdown-shortcuts-list {
    min-width: 340px;
    max-height: 480px;
    background-color: var(--bs-dropdown-bg);
  }
  .dropdown-shortcuts-item {
    padding: 1.75rem 1rem;
    text-align: center;
    transition: all 0.2s ease;
    border-bottom: 1px solid rgba(var(--bs-border-color-rgb), 0.5);
    border-right: 1px solid rgba(var(--bs-border-color-rgb), 0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .dropdown-shortcuts-item:hover {
    background-color: rgba(var(--bs-primary-rgb), 0.04);
    transform: scale(1.02);
    z-index: 1;
  }
  .dropdown-shortcuts-icon {
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.75rem;
    transition: all 0.3s;
    background-color: rgba(var(--bs-secondary-rgb), 0.08); /* Default icon bg */
  }
  .dropdown-shortcuts-item:hover .dropdown-shortcuts-icon {
    background-color: var(--bs-primary) !important;
    color: #fff !important;
    box-shadow: 0 4px 12px rgba(var(--bs-primary-rgb), 0.3);
  }
  
  /* Text Alignment & Hierarchy */
  .dropdown-shortcuts-item a {
    color: var(--bs-heading-color);
    font-weight: 600 !important;
    font-size: 0.9375rem;
    line-height: 1.2;
    margin-bottom: 0.25rem;
  }
  .dropdown-shortcuts-item small {
    font-size: 0.75rem;
    color: var(--bs-secondary-color) !important;
    display: block;
  }

  [dir="rtl"] .dropdown-shortcuts-item {
    border-right: 0;
    border-left: 1px solid rgba(var(--bs-border-color-rgb), 0.5);
  }

  /* Trigger Button Professional Touch */
  .nav-item.dropdown-shortcuts .nav-link {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.2s;
  }
  .nav-item.dropdown-shortcuts .nav-link:hover {
    background-color: rgba(var(--bs-secondary-rgb), 0.1);
  }

  /* --- Responsive Mastery & Optimization --- */
  
  /* Mobile Spacing & Padding */
  @media (max-width: 767.98px) {
    .content-wrapper { padding: 0.75rem !important; }
    .card-body { padding: 1.25rem !important; }
    .card-header { padding: 1.25rem !important; }
    .hero-card-premium .card-body { padding: 1.5rem !important; }
    
    /* Responsive Typography */
    h3, .h3 { font-size: 1.5rem !important; }
    h4, .h4 { font-size: 1.25rem !important; }
    .display-6 { font-size: 2rem !important; }
    
    /* Navbar Adjustment */
    .navbar-detached { margin: 0.5rem 0.5rem 1rem 0.5rem !important; width: calc(100% - 1rem) !important; }
    
    /* Table Fixes */
    .table-responsive { border: 0 !important; }
  }

  /* Tablet Adjustments */
  @media (min-width: 768px) and (max-width: 1199.98px) {
    .content-wrapper { padding: 1.5rem !important; }
  }

  /* Executive Glassmorphism & Fixed Header Tweaks */
  .layout-navbar-fixed .layout-navbar {
    backdrop-filter: blur(8px);
    background-color: rgba(var(--bs-white-rgb), 0.8) !important;
  }
  
  [data-bs-theme="dark"] .layout-navbar-fixed .layout-navbar {
    background-color: rgba(var(--bs-body-bg-rgb), 0.8) !important;
  }
</style>


{% if text_direction_value == 'rtl' %}
<link rel="stylesheet" href="{% static 'css/rtl.css' %}" />
{% endif %}
